name: speakeasy
description: Open source version of tabu
version: 2.0.0+27
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Localization
  easy_localization: ^3.0.7
  flutter_localized_locales: ^2.0.5
  locale_emoji: ^0.2.1

  # Data
  csv: ^6.0.0
  shared_preferences: ^2.3.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  auto_size_text: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flex_color_scheme: ^8.1.0
  animated_emoji: ^3.1.0

  # Platform
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  vibration: ^2.0.1
  wakelock_plus: ^1.2.8
  package_info_plus: ^8.1.3
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  very_good_analysis: ^7.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter_launcher_icons:
  ios: true
  android: true
  remove_alpha_ios: true
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/words/it/
    - assets/words/en/
    - assets/sounds/
    - assets/icons/
    - assets/lang/
    - packages/animated_emoji/lottie/partyPopper.json
    - packages/animated_emoji/lottie/neutralFace.json

  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SF-Pro-Display-Black.otf
